apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: home-ip-pool
spec:
  blocks:
    - start: "192.168.0.20"
      stop: "192.168.0.39"
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: home-l2-network
spec:
  loadBalancerIPs: true
  interfaces:
    - ^eth
    - ^enp
