apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: hubble-auth-redirect
  namespace: kube-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: hubble-cilium
  responseOverride:
  - match:
      statusCodes:
      - type: Value
        value: 302
    response:
      statusCode: 302
      header:
        set:
        - name: Location
          value: "https://auth.k8s.cguertin.dev/oauth2/start?rd=https://network.k8s.cguertin.dev/"
