apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: paperless

generators:
- secrets-generator.yml

resources:
- resources/valkey.yml
- resources/postgres.yml
- resources/tika.yml
- resources/gotenberg.yml
- resources/httproute.yml
- resources/security-policy.yml
- resources/backend-traffic-policy.yml

# Workaround for Kustomize bug: namespace transformer doesn't apply to helmCharts resources
# NOTE: This will be fixed in the version after Kustomize v5.8.0: https://github.com/kubernetes-sigs/kustomize/releases/tag/kustomize%2Fv5.8.0
patches:
- target:
    name: paperless
  patch: |-
    - op: add
      path: /metadata/namespace
      value: paperless
- target:
    name: paperless-config
    kind: PersistentVolumeClaim
  patch: |-
    - op: add
      path: /metadata/namespace
      value: paperless

images:
- name: ghcr.io/paperless-ngx/paperless-ngx
  newTag: 2.20.6
- name: public.ecr.aws/valkey/valkey
  newTag: 9.0-alpine
- name: gotenberg/gotenberg
  newTag: "8.26"
- name: apache/tika
  newTag: "3.2.3.0"

helmCharts:
- name: paperless
  releaseName: paperless
  repo: https://k8s-at-home.com/charts/
  version: 9.1.3
  valuesInline:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
              - amd64
    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: 192.168.0.24
    probes:
      liveness:
        custom: true
        spec:
          httpGet:
            path: /
            port: 8000
            scheme: HTTP
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
      readiness:
        custom: true
        spec:
          httpGet:
            path: /
            port: 8000
            scheme: HTTP
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
    env:
      TZ: America/Toronto
      # Tika/Gotenberg
      PAPERLESS_TIKA_ENABLED: true
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless-gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://paperless-tika:9998
      PAPERLESS_URL: https://classeur.cguertin.dev
      # Trust the remote user header from oauth2-proxy (via ext_authz)
      # so Paperless auto-logs in users and doesn't return its own 302 login redirects
      PAPERLESS_ENABLE_HTTP_REMOTE_USER: "true"
      PAPERLESS_HTTP_REMOTE_USER_HEADER_NAME: HTTP_X_AUTH_REQUEST_EMAIL
      # Valkey
      PAPERLESS_REDIS: redis://paperless-valkey
      # Postgres
      PAPERLESS_DBENGINE: postgresql
      PAPERLESS_DBHOST: paperless-postgres-rw
      PAPERLESS_DBNAME: paperless-db
      PAPERLESS_DBSSLMODE: prefer
      PAPERLESS_DBUSER: paperless-user
      # The password comes from a secret
      PAPERLESS_DBPASS:
        valueFrom:
          secretKeyRef:
            name: paperless-postgres-creds
            key: password
    ingress:
      main:
        enabled: false
    postgres:
      enabled: false
    redis:
      enabled: false
    persistence:
      data:
        enabled: true
        size: 10Gi
        storageClass: ceph-block
      media:
        enabled: true
        size: 10Gi
        storageClass: ceph-block
      export:
        enabled: true
        size: 1Gi
        storageClass: ceph-block
      consume:
        enabled: true
        size: 1Gi
        storageClass: ceph-block
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 375m
        memory: 2Gi
