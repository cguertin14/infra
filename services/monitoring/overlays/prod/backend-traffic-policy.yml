apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: alertmanager-auth-redirect
  namespace: monitoring
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: alertmanager
  responseOverride:
  - match:
      statusCodes:
      - type: Value
        value: 302
    response:
      statusCode: 302
      header:
        set:
        - name: Location
          value: "https://auth.k8s.cguertin.dev/oauth2/start?rd=https://alertmanager.monitoring.k8s.cguertin.dev/"
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: prometheus-auth-redirect
  namespace: monitoring
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: prometheus
  responseOverride:
  - match:
      statusCodes:
      - type: Value
        value: 302
    response:
      statusCode: 302
      header:
        set:
        - name: Location
          value: "https://auth.k8s.cguertin.dev/oauth2/start?rd=https://prometheus.monitoring.k8s.cguertin.dev/"
