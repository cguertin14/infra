  - type: "type.googleapis.com/envoy.config.listener.v3.Listener"
    name: "envoy-gateway-system/envoy-gateway/cguertin-dev-https"
    operation:
      op: add
      path: "/filter_chains/4/filters/0/typed_config/http_filters/0/typed_config/http_service/authorization_response/allowed_client_headers"
      value:
        patterns:
        - exact: "location"
          ignore_case: true
        - exact: "set-cookie"
          ignore_case: true
