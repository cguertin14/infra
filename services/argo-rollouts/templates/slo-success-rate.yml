apiVersion: argoproj.io/v1alpha1
kind: ClusterAnalysisTemplate
metadata:
  name: slo-success-rate
spec:
  args:
  - name: service-name
  - name: namespace
  metrics:
  - name: availability-sli-success-rate
    initialDelay: 45s
    # 99.99% Availability SLI
    successCondition: isNaN(result[0]) || result[0] >= 0.9999
    failureLimit: 5
    provider:
      prometheus:
        address: http://prometheus-k8s.monitoring.svc.cluster.local:9090
        query: |
          (
            sum(rate(envoy_cluster_upstream_rq_completed{envoy_cluster_name=~"httproute/{{args.namespace}}/{{args.service-name}}.*"}[5m]))
            - (sum(rate(envoy_cluster_upstream_rq_xx{envoy_response_code_class="5", envoy_cluster_name=~"httproute/{{args.namespace}}/{{args.service-name}}.*"}[5m])) or vector(0))
          )
          /
          sum(rate(envoy_cluster_upstream_rq_completed{envoy_cluster_name=~"httproute/{{args.namespace}}/{{args.service-name}}.*"}[5m]))
  - name: latency-sli-success-rate
    initialDelay: 45s
    # 99.95% Latency SLI
    successCondition: isNaN(result[0]) || result[0] >= 0.9995
    failureLimit: 5
    provider:
      prometheus:
        address: http://prometheus-k8s.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(envoy_cluster_upstream_rq_time_bucket{le="500.0", envoy_cluster_name=~"httproute/{{args.namespace}}/{{args.service-name}}.*"}[5m]))
          /
          sum(rate(envoy_cluster_upstream_rq_time_bucket{le="+Inf", envoy_cluster_name=~"httproute/{{args.namespace}}/{{args.service-name}}.*"}[5m]))
