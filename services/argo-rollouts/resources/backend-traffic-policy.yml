apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: argo-rollouts-auth-redirect
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: argo-rollout-dashboard
  responseOverride:
  - match:
      statusCodes:
      - type: Value
        value: 302
    redirect:
      scheme: https
      hostname: auth.k8s.cguertin.dev
      path:
        type: ReplaceFullPath
        replaceFullPath: /oauth2/start?rd=https://rollout.gitops.k8s.cguertin.dev/
      statusCode: 302
