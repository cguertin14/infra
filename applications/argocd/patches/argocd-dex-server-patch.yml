apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
spec:
  template:
    spec:
      containers:
      - name: dex
        command:
        - /bin/sh
        - -c
        - |
          (
            LAST=""
            CHECK_INTERVAL_SECONDS="0.2" # matches the upstream mobile-for-argocd watcher timing
            while true; do
              MODIFIED_TIME=$(stat -c %Y /tmp/dex.yaml 2>/dev/null)
              if [ "$MODIFIED_TIME" != "$LAST" ]; then
                LAST=$MODIFIED_TIME
                if ! grep -q "argocd://auth/callback" /tmp/dex.yaml 2>/dev/null; then
                  if grep -q "http://localhost:4000/auth/callback" /tmp/dex.yaml 2>/dev/null; then
                    sed -i '/http:\/\/localhost:4000\/auth\/callback/a\  - argocd://auth/callback' /tmp/dex.yaml
                  else
                    echo "expected to find http://localhost:4000/auth/callback in /tmp/dex.yaml before injecting argocd://auth/callback; will retry after the next file change" >&2
                  fi
                fi
              fi
              sleep "$CHECK_INTERVAL_SECONDS"
            done
          ) & exec /shared/argocd-dex rundex
