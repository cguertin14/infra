apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
spec:
  template:
    spec:
      containers:
      - name: dex
        command:
        - /bin/sh
        - -c
        - |
          (
            LAST=""
            while true; do
              M=$(stat -c %Y /tmp/dex.yaml 2>/dev/null)
              if [ "$M" != "$LAST" ]; then
                LAST=$M
                grep -q "argocd://auth/callback" /tmp/dex.yaml 2>/dev/null || \
                  sed -i "s|  - http://localhost:8085/auth/callback|  - http://localhost:8085/auth/callback\\n  - argocd://auth/callback|" /tmp/dex.yaml
              fi
              sleep 0.2
            done
          ) & exec /shared/argocd-dex rundex
