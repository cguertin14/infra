apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
spec:
  template:
    spec:
      containers:
      - name: dex
        command:
        - /bin/sh
        - -c
        - |
          # wrap the dex binary: whenever argocd-dex calls dex, our wrapper
          # patches dex.yaml before the real dex binary reads it.
          cp /usr/local/bin/dex /usr/local/bin/dex.real
          cat > /usr/local/bin/dex <<'WRAPPER'
          #!/bin/sh
          if [ -f /tmp/dex.yaml ] && ! grep -q "argocd://auth/callback" /tmp/dex.yaml; then
            sed -i '/http:\/\/localhost:8085\/auth\/callback/a\  - argocd://auth/callback' /tmp/dex.yaml
          fi
          exec /usr/local/bin/dex.real "$@"
          WRAPPER
          chmod +x /usr/local/bin/dex
          exec /shared/argocd-dex rundex
