apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
spec:
  template:
    spec:
      containers:
      - name: dex
        command:
        - /bin/sh
        - -c
        - |
          (
            LAST=""
            while true; do
              M=$(stat -c %Y /tmp/dex.yaml 2>/dev/null)
              if [ "$M" != "$LAST" ]; then
                LAST=$M
                if grep -q "argocd://auth/callback" /tmp/dex.yaml 2>/dev/null; then
                  true
                elif grep -q "http://localhost:8085/auth/callback" /tmp/dex.yaml 2>/dev/null; then
                  sed -i '/http:\/\/localhost:8085\/auth\/callback/a\  - argocd://auth/callback' /tmp/dex.yaml
                else
                  echo "missing expected Dex localhost callback in /tmp/dex.yaml" >&2
                fi
              fi
              sleep 0.2
            done
          ) & exec /shared/argocd-dex rundex
