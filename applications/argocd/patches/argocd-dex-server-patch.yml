apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
spec:
  template:
    spec:
      containers:
      - name: dex
        command:
        - /bin/sh
        - -c
        - |
          # create a wrapper that shadows the real dex binary via PATH.
          # when argocd-dex calls "dex serve /tmp/dex.yaml", our wrapper
          # patches dex.yaml before delegating to the real binary.
          mkdir -p /tmp/bin
          DEX_REAL=$(which dex)
          cat > /tmp/bin/dex <<WRAPPER
          #!/bin/sh
          if [ -f /tmp/dex.yaml ] && ! grep -q "argocd://auth/callback" /tmp/dex.yaml; then
            sed -i '/http:\/\/localhost:8085\/auth\/callback/a\  - argocd://auth/callback' /tmp/dex.yaml
          fi
          exec $DEX_REAL "\$@"
          WRAPPER
          chmod +x /tmp/bin/dex
          export PATH="/tmp/bin:$PATH"
          exec /shared/argocd-dex rundex
