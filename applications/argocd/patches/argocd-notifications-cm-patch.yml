apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
data:
  # Slack webhook service configuration.
  # The webhook URL is referenced from argocd-notifications-secret.
  service.webhook.slack: |
    url: $slack-webhook-url
    headers:
    - name: Content-Type
      value: application/json

  # Trigger on sync succeeded.
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  # Trigger on sync failed.
  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  # Trigger on sync running.
  trigger.on-sync-running: |
    - when: app.status.operationState.phase in ['Running']
      send: [app-sync-running]

  # Template for sync succeeded.
  template.app-sync-succeeded: |
    webhook:
      slack:
        method: POST
        body: |
          {
            "attachments": [{
              "color": "#18be52",
              "title": ":white_check_mark: {{ .app.metadata.name }} - Sync Succeeded",
              "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "fields": [
                { "title": ":package: Project", "value": "{{ .app.spec.project }}", "short": true },
                { "title": ":bookmark: Revision", "value": "{{ .app.status.sync.revision | trunc 7 }}", "short": true },
                { "title": ":rocket: Destination", "value": "{{ .app.spec.destination.namespace }}", "short": true }
              ]
            }]
          }

  # Template for sync failed.
  template.app-sync-failed: |
    webhook:
      slack:
        method: POST
        body: |
          {
            "attachments": [{
              "color": "#e8112d",
              "title": ":x: {{ .app.metadata.name }} - Sync Failed",
              "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "fields": [
                { "title": ":package: Project", "value": "{{ .app.spec.project }}", "short": true },
                { "title": ":bookmark: Revision", "value": "{{ .app.status.sync.revision | trunc 7 }}", "short": true },
                { "title": ":rocket: Destination", "value": "{{ .app.spec.destination.namespace }}", "short": true },
                { "title": ":memo: Error", "value": "{{ .app.status.operationState.message }}", "short": false }
              ]
            }]
          }

  # Template for sync running.
  template.app-sync-running: |
    webhook:
      slack:
        method: POST
        body: |
          {
            "attachments": [{
              "color": "#0dadea",
              "title": ":arrows_counterclockwise: {{ .app.metadata.name }} - Sync Running",
              "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
              "fields": [
                { "title": ":package: Project", "value": "{{ .app.spec.project }}", "short": true },
                { "title": ":bookmark: Revision", "value": "{{ .app.status.sync.revision | trunc 7 }}", "short": true },
                { "title": ":rocket: Destination", "value": "{{ .app.spec.destination.namespace }}", "short": true }
              ]
            }]
          }
