apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mediaplatform

resources:
- resources/namespace.yml
- resources/volumes.yml
- resources/httproutes.yml
- resources/jellyfin-login-rate-limit.yml
- resources/security-policy.yml
- resources/backend-traffic-policy.yml

## Important: Storage logic
#
# 1. each service must have its own PVC. -> Add 'persistence' to each chart. -> DONE.
# 2. radarr and sonarr all use the same PVC as Jellyfin.

helmCharts:
- name: jellyfin
  namespace: mediaplatform
  releaseName: jellyfin
  repo: https://k8s-at-home.com/charts/
  valuesInline:
    env:
      TZ: America/Toronto
      JELLYFIN_PublishedServerUrl: https://jellyfin.media.cguertin.dev
    persistence:
      config:
        enabled: true
        size: 20Gi
        storageClass: ceph-block
    # resources:
    #   # Warning: No limits.
    #   requests:
    #     cpu: '2'
    #     memory: 4Gi
  version: 9.5.3
# Below charts live here -> https://github.com/k8s-at-home/charts/tree/master/charts/stable
- name: radarr
  namespace: mediaplatform
  releaseName: radarr
  repo: https://k8s-at-home.com/charts/
  valuesInline:
    env:
      TZ: America/Toronto
    persistence:
      config:
        enabled: true
        size: 2Gi
        storageClass: ceph-block
  version: 16.3.2
- name: sonarr
  namespace: mediaplatform
  releaseName: sonarr
  repo: https://k8s-at-home.com/charts/
  valuesInline:
    env:
      TZ: America/Toronto
    persistence:
      config:
        enabled: true
        size: 2Gi
        storageClass: ceph-block
  version: 16.3.2
- name: prowlarr
  namespace: mediaplatform
  releaseName: prowlarr
  repo: https://k8s-at-home.com/charts/
  valuesInline:
    env:
      TZ: America/Toronto
    persistence:
      config:
        enabled: true
        size: 2Gi
        storageClass: ceph-block
  version: 4.5.2
- name: sabnzbd
  namespace: mediaplatform
  releaseName: sabnzbd
  repo: https://k8s-at-home.com/charts/
  valuesInline:
    env:
      TZ: America/Toronto
    persistence:
      config:
        enabled: true
        size: 2Gi
        storageClass: ceph-block
    # resources:
    #   # Warning: No limits.
    #   requests:
    #     cpu: '0.5' # take half a core.
    #     memory: 1Gi
  version: 9.4.2

# Setting proper image tags on each service.
images:
- name: jellyfin/jellyfin
  newTag: 10.11.8
- name: ghcr.io/k8s-at-home/sonarr
  newName: linuxserver/sonarr
  newTag: 4.0.17
- name: ghcr.io/k8s-at-home/radarr
  newName: linuxserver/radarr
  newTag: 6.1.1
- name: ghcr.io/k8s-at-home/prowlarr
  newName: linuxserver/prowlarr
  newTag: 2.3.5
- name: ghcr.io/k8s-at-home/sabnzbd
  newName: linuxserver/sabnzbd
  newTag: 5.0.1

# Patches to add standalone common PVC to each service.
patches:
- path: patches/container-auth-patch.yml # add env variables to each service
- path: patches/jellyfin-intel-quick-sync-patch.yml # configure Intel Quick Sync on Jellyfin
- path: patches/jellyfin-affinity-rules-patch.yml # configure Jellyfin to run on the mediaserver node
- path: patches/sabnzbd-affinity-rules-patch.yml # configure Sabnzbd to run on the mediaserver node
- path: patches/jellyfin-load-balancer-patch.yml # configure Jellyfin to use a Load Balancer
  target:
    kind: Service
    name: jellyfin
    version: v1
- path: patches/pvc-mediaserver-player-patch.yml
  target:
    group: apps
    kind: Deployment
    name: jellyfin
    version: v1
- path: patches/pvc-mediaserver-movies-patch.yml
  target:
    group: apps
    kind: Deployment
    name: radarr
    version: v1
- path: patches/pvc-mediaserver-tvshows-patch.yml
  target:
    group: apps
    kind: Deployment
    name: sonarr
    version: v1
- path: patches/pvc-mediaserver-downloads-patch.yml
  target:
    group: apps
    kind: Deployment
    name: sabnzbd
    version: v1

configMapGenerator:
- literals:
  - PUID=1001
  - PGID=1002
  name: mediaplatform-env
