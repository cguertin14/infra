apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: obsidianls

generators:
- secrets-generator.yml

resources:
- resources/httproute.yml
- resources/rate-limit.yml

# Workaround for https://github.com/kubernetes-sigs/kustomize/issues/6058:
# since Kustomize 5.8.0, the top-level `namespace:` field no longer adds a
# namespace to helm-rendered resources that don't already declare one in their
# metadata. One patch with a name regex covers all the chart's resources.
patches:
- target:
    name: "obsidianls-.*"
  patch: |-
    - op: add
      path: /metadata/namespace
      value: obsidianls

helmCharts:
- name: couchdb
  releaseName: obsidianls
  namespace: obsidianls
  repo: https://apache.github.io/couchdb-helm
  version: 4.6.3
  valuesInline:
    # Single-node — this only syncs personal Obsidian notes. No HA needed.
    # n=1, w=1, r=1; data durability comes from the Ceph-backed PVC.
    clusterSize: 1
    # Admin credentials come from a pre-existing Secret (see secrets/admin.yml)
    # rather than being auto-generated by the chart. allowAdminParty stays at
    # its chart default (false), so anonymous admin access is never allowed.
    createAdminSecret: false
    # The chart looks for a Secret named "<releaseName>-couchdb" with keys:
    #   adminUsername, adminPassword, cookieAuthSecret
    # We provide it via SOPS-encrypted secret in secrets/admin.yml.

    # Persistence — keep the database across pod restarts.
    persistentVolume:
      enabled: true
      size: 10Gi
      storageClass: ceph-block

    # Resource requests/limits
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 512Mi

    # Erlang cookie — required by chart v3+; not really used in single-node
    # but the chart refuses to render without it being set or autogenerated.
    erlangFlags:
      name: couchdb
      setcookie: obsidianls-erlang-cookie

    # CouchDB configuration (rendered into local.ini).
    # Settings mirror the LiveSync `couchdb-init.sh` script:
    # https://github.com/vrtmrz/obsidian-livesync/blob/main/utils/couchdb/couchdb-init.sh
    couchdbConfig:
      couchdb:
        # MANDATORY since chart v3 — must be a 32-char hex string, stable across upgrades.
        uuid: d686d670739249b2b2ff85859be14735
        # Larger limit for Obsidian vaults containing attachments.
        max_document_size: 50000000
      chttpd:
        # Reject anonymous requests at the HTTP layer — every request must
        # authenticate. Fauxton (/_utils) is also blocked at the HTTPRoute
        # level for defense-in-depth.
        require_valid_user: true
        enable_cors: true
        # 4 GiB — required by LiveSync for large attachment uploads.
        max_http_request_size: "4294967296"
      chttpd_auth:
        # Required by LiveSync — ensures the auth subsystem also enforces
        # the require_valid_user check (separate from chttpd above).
        require_valid_user: true
      httpd:
        # LiveSync sets this so browsers/Obsidian prompt for credentials properly.
        WWW-Authenticate: 'Basic realm="couchdb"'
        enable_cors: true
      # CORS settings required by the Obsidian LiveSync plugin
      cors:
        credentials: "true"
        origins: "app://obsidian.md,capacitor://localhost,http://localhost"
        methods: "GET, PUT, POST, HEAD, DELETE"
        headers: "accept, authorization, content-type, origin, referer, x-csrf-token"

    # Service — ClusterIP only. Exposure goes through Envoy Gateway.
    service:
      enabled: true
      type: ClusterIP
      externalPort: 5984

    # No ingress — we use Gateway API instead
    ingress:
      enabled: false
