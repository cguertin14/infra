---
# Block Fauxton (admin UI) at the gateway layer.
# An HTTPRoute with no backendRefs and a DirectResponse via filter would be
# ideal, but Envoy Gateway supports this through a separate HTTPRouteFilter.
# Simplest portable approach: route /_utils to a non-existent backend with
# requestRedirect to "/" — but we want a clean 404 instead.
# Envoy Gateway exposes the "DirectResponse" filter via gateway.envoyproxy.io/v1alpha1.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: obsidianls-fauxton-block
  namespace: obsidianls
spec:
  directResponse:
    statusCode: 404
    body:
      type: Inline
      inline: "Not Found"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: obsidianls
  namespace: obsidianls
spec:
  hostnames:
  - obsidianls.cguertin.dev
  parentRefs:
  - name: envoy-gateway
    namespace: envoy-gateway-system
  rules:
  # Block Fauxton (/_utils) and the underlying static assets — return 404.
  - matches:
    - path:
        type: PathPrefix
        value: /_utils
    filters:
    - type: ExtensionRef
      extensionRef:
        group: gateway.envoyproxy.io
        kind: HTTPRouteFilter
        name: obsidianls-fauxton-block
  # Default catch-all — proxy everything else to CouchDB.
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: obsidianls-svc-couchdb
      port: 5984
