---
# Dedicated HTTPRoute for the auth endpoints — used as the targetRef for
# the rate limit policy. Keeps rate limits scoped to login surfaces.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: obsidianls-auth
  namespace: obsidianls
spec:
  hostnames:
  - obsidianls.cguertin.dev
  parentRefs:
  - name: envoy-gateway
    namespace: envoy-gateway-system
  rules:
  - matches:
    - path:
        type: Exact
        value: /_session
    - path:
        type: PathPrefix
        value: /api/token/
    backendRefs:
    - name: obsidianls-svc-couchdb
      port: 5984
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: obsidianls-auth-rate-limit
  namespace: obsidianls
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: obsidianls-auth
  rateLimit:
    local:
      rules:
      - limit:
          requests: 10
          unit: Minute
