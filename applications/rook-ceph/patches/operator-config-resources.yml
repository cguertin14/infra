apiVersion: csi.ceph.io/v1
kind: OperatorConfig
metadata:
  name: ceph-csi-operator-config
spec:
  driverSpecDefaults:
    nodePlugin:
      resources:
        registrar:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 128Mi
        plugin:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 128Mi
        liveness:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 128Mi