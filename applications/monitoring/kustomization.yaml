apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- github.com/prometheus-operator/kube-prometheus?ref=v0.16.0
- rbac.yml
- alerts/
- grafana-pvc.yml
- httproutes.yml
- security-policy.yml
- backend-traffic-policy.yml

generators:
- secrets-generator.yml

patches:
- path: patches/network-policies-reverse-proxy.yml
  target:
    group: networking.k8s.io
    kind: NetworkPolicy
    name: alertmanager-main
    namespace: monitoring
    version: v1
- path: patches/network-policies-reverse-proxy.yml
  target:
    group: networking.k8s.io
    kind: NetworkPolicy
    name: prometheus-k8s
    namespace: monitoring
    version: v1
- path: patches/network-policies-reverse-proxy.yml
  target:
    group: networking.k8s.io
    kind: NetworkPolicy
    name: grafana
    namespace: monitoring
    version: v1
- path: patches/network-policy-prometheus-traffic.yml
  target:
    group: networking.k8s.io
    kind: NetworkPolicy
    name: prometheus-k8s
    namespace: monitoring
    version: v1
- path: patches/prometheus-alerts-patch.yml
  target:
    group: monitoring.coreos.com
    kind: PrometheusRule
    name: kubernetes-monitoring-rules
    namespace: monitoring
    version: v1
- path: patches/prometheus-alerts-patch-2.yml
  target:
    group: monitoring.coreos.com
    kind: PrometheusRule
    name: node-exporter-rules
    namespace: monitoring
    version: v1
- path: patches/grafana-resources-patch.yml
  target:
    kind: Deployment
    name: grafana
    namespace: monitoring
    version: v1
- path: patches/alertmanager-modifications.yml
  target:
    group: monitoring.coreos.com
    kind: Alertmanager
    name: main
    namespace: monitoring
    version: v1

patchesStrategicMerge:
- patches/rbac.yml
- patches/namespace.yml
- patches/crds-length.yml
- patches/prometheus-modifications.yml
- patches/grafana-strategic-patches.yml
- patches/apiservice-metrics-server.yml

images:
- name: k8s.gcr.io/kube-state-metrics/kube-state-metrics
  newName: registry.k8s.io/kube-state-metrics/kube-state-metrics
  newTag: v2.18.0

configMapGenerator:
- name: grafana-settings-config
  namespace: monitoring
  options:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  envs:
  - env/grafana-settings
- name: grafana-dashboards-custom
  namespace: monitoring
  options:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  files:
  - dashboards/argocd.json
  - dashboards/argo-rollouts.json
  - dashboards/machine_temperatures_v1.0.1.json
- name: grafana-dashboards-custom-2
  namespace: monitoring
  options:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  files:
  - dashboards/blog_slos.json
  - https://raw.githubusercontent.com/envoyproxy/gateway/refs/heads/main/charts/gateway-addons-helm/dashboards/envoy-clusters.json
  - https://raw.githubusercontent.com/envoyproxy/gateway/refs/heads/main/charts/gateway-addons-helm/dashboards/envoy-gateway-global.json
  - dashboards/nvidia-dashboard-3.json
  - dashboards/educs_slos.json
- name: grafana-dashboards-custom-3
  namespace: monitoring
  options:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  files:
  - dashboards/ceph_cluster_dashboard_v2.json
  - dashboards/ceph_osd_single_dashboard_v2.json
  - dashboards/ceph_pools_dashboard.json
- name: grafana-dashboards-custom-4
  namespace: monitoring
  options:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  files:
  - dashboards/velero.json
- name: grafana-dashboards-custom-5
  namespace: monitoring
  options:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  files:
  - dashboards/cilium-dashboard.json
  - dashboards/cilium-operator-dashboard.json
  - https://raw.githubusercontent.com/envoyproxy/gateway/refs/heads/main/charts/gateway-addons-helm/dashboards/envoy-proxy-global.json
- name: grafana-dashboards-custom-6
  namespace: monitoring
  options:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  files:
  - dashboards/hubble-dashboard.json
  - dashboards/hubble-dns-namespace.json
- name: grafana-dashboards-custom-7
  namespace: monitoring
  options:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  files:
  - dashboards/hubble-l7-http-metrics-by-workload.json
  - dashboards/hubble-network-overview-namespace.json

secretGenerator:
- name: grafana-datasources
  namespace: monitoring
  behavior: replace
  files:
  - datasources.yaml=secrets/datasources.json
