apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperless-login
  namespace: paperless
spec:
  hostnames:
  - classeur.cguertin.dev
  parentRefs:
  - name: envoy-gateway
    namespace: envoy-gateway-system
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/token/
      method: POST
    backendRefs:
    - name: paperless
      port: 8000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: paperless-login-rate-limit
  namespace: paperless
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: paperless-login
  rateLimit:
    local:
      rules:
      - limit:
          requests: 3
          unit: Minute
