apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- https://github.com/cguertin14/lululemon-stockchecker/manifests?ref=main

images:
- name: quay.io/cguertin14/lululemon-stockchecker
  newTag: v0.1.4

patchesStrategicMerge:
- patches/set-product-to-observe.yml

generators:
- secrets-generator.yml

patches:
- path: patches/suspend-cronjob.yml
  target:
    kind: CronJob
    name: lululemon-stockchecker-cron
    version: v1
    group: batch
    namespace: lululemon-stockchecker
