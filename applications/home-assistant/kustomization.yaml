apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: home-assistant

resources:
- resources/namespace.yml
- resources/voice-assistant-whisper.yml
- resources/voice-assistant-piper.yml
- resources/httproute.yml
# - resources/pv.yml

images:
- name: ghcr.io/home-assistant/home-assistant
  newName: homeassistant/home-assistant
  newTag: "2026.3"
- name: lscr.io/linuxserver/faster-whisper
  newTag: "3.1.0-gpu-legacy"
- name: lscr.io/linuxserver/piper
  newTag: "2.2.2"

replicas:
- name: whisper
  count: 1
- name: piper
  count: 1

configMapGenerator:
- name: whisper-config
  literals:
  - PUID=1001
  - PGID=1002
  - TZ=America/Toronto
  - WHISPER_MODEL=small
  - WHISPER_LANG=en
  - WHISPER_BEAM=5
- name: piper-config
  literals:
  - PUID=1001
  - PGID=1002
  - TZ=America/Toronto
  - PIPER_VOICE=en_US-amy-medium
  # - PIPER_LENGTH=1.0 #optional
  # - PIPER_NOISE=0.667 #optional
  # - PIPER_NOISEW=0.333 #optional
  # - PIPER_SPEAKER=0 #optional
  # - PIPER_PROCS=1 #optional

helmCharts:
- name: home-assistant
  namespace: home-assistant
  releaseName: home-assistant
  repo: https://k8s-at-home.com/charts/
  version: 13.4.2
  valuesInline:
    env:
      TZ: America/Toronto
    
    # This is required to access the host machine's USB devices and Bluetooth.
    securityContext:
      privileged: true
      capabilities:
        add:
          - NET_ADMIN
          - NET_RAW

    persistence:
      config:
        enabled: true
        storageClass: ceph-block
        size: 2Gi
      usb:
        enabled: true
        type: hostPath
        hostPath: /dev/bus/usb/001/003
      dbus:
        enabled: true
        type: hostPath
        hostPath: /run/dbus

    # Affinity rule to schedule home-assistant on capable nodes.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
              # Nodes with USB Zigbee devices attached.
              - worker3
              - worker4
              - worker5

    ingress:
      main:
        enabled: false

    # WARNING: Find out how much resources are needed for home-assistant, might remain empty.
    resources:
      requests:
        cpu: 30m
        memory: 1Gi
      limits:
        memory: 1Gi

patches:
- path: patches/home-assistant-hostnetwork-patch.yml
