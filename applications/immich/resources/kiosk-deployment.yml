apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-kiosk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-kiosk
  template:
    metadata:
      labels:
        app: immich-kiosk
    spec:
      containers:
      - name: immich-kiosk
        image: ghcr.io/damongolding/immich-kiosk
        ports:
        - containerPort: 3000
        env:
        - name: TZ
          value: America/Toronto
        - name: KIOSK_IMMICH_URL
          value: http://immich-server:2283
        - name: KIOSK_IMMICH_API_KEY
          valueFrom:
            secretKeyRef:
              name: immich-kiosk-api-key
              key: api-key
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
