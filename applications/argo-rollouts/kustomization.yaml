apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo-rollouts

resources:
- github.com/argoproj/argo-rollouts/manifests/cluster-install?ref=v1.9.0&timeout=90s
- resources/namespace.yml
- metrics/service-monitor.yml
- templates/replicaset-ready.yml
- templates/slo-success-rate.yml
- templates/load-tester.yml

images:
- name: quay.io/argoproj/argo-rollouts
  newTag: v1.9.0
- name: cguertz/load-tester
  newTag: v1.0.0

configurations:
- https://argoproj.github.io/argo-rollouts/features/kustomize/rollout-transform.yaml

patches:
- path: patches/controller-metrics.yml
- path: patches/add-metrics-label-to-svc.yml
  target:
    group: rbac.authorization.k8s.io
    kind: ClusterRole
    name: argo-rollouts-clusterrole
    version: v1
